services:
  # Any-Sync Bundle (grishy/any-sync-bundle)
  any-sync-bundle:
    image: ghcr.io/grishy/any-sync-bundle:${ANY_SYNC_BUNDLE_VERSION}
    container_name: any-sync-bundle
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ANY_SYNC_BUNDLE_INIT_EXTERNAL_ADDRS=${HOST_IP}
      - ANY_SYNC_BUNDLE_MONGODB_URI=mongodb://mongo:27017/any-sync?replicaSet=rs0
      - ANY_SYNC_BUNDLE_REDIS_URI=redis://redis:6379
    volumes:
      - ./etc:/etc/any-sync-bundle:Z
    ports:
      - "${ANY_SYNC_DRPC_PORT}:010"
      - "${ANY_SYNC_QUIC_PORT}:020/udp"
      - "${ANY_SYNC_INFO_PORT}:8080"
    labels:
      dev.arcane.icon: "${ARCANE_ICON}"
      dev.arcane.category: "${ARCANE_CATEGORY}"
      com.docker.compose.project: "anytype"
      com.docker.compose.project.working_dir: "/app/data/projects/anytype"
    networks:
      internal_net:
        ipv4_address: ${PROJECT_IP}

  mongo:
    image: docker.io/library/mongo:${MONGO_VERSION}
    container_name: any-sync-mongo
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - ./storage/mongo:/data/db:Z
    networks:
      - internal_net
    healthcheck:
      # Use localhost inside the container for more reliable healthcheck in rootless Podman
      test: mongosh --port 27017 --eval "rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) || rs.status().ok"
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/redis/redis-stack-server:${REDIS_VERSION}
    container_name: any-sync-redis
    restart: unless-stopped
    volumes:
      - ./storage/redis:/data:Z
    networks:
      - internal_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  internal_net:
    external: true
