version: '3.8'

services:
  postgres:
    image: ghcr.io/insforge/postgres-all:${POSTGRES_VERSION}
    container_name: insforge-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - postgres-data:/var/lib/postgresql/data:Z
    networks:
      - internal_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      - "com.docker.compose.project=insforge"

  postgrest:
    image: postgrest/postgrest:${POSTGREST_VERSION}
    container_name: insforge-postgrest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PGRST_OPENAPI_SERVER_PROXY_URI: http://${HOST_IP}:3000
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_CHANNEL_ENABLED: true
      PGRST_DB_CHANNEL: pgrst
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal_net
    labels:
      - "com.docker.compose.project=insforge"

  insforge:
    image: ghcr.io/insforge/insforge-oss:${INSFORGE_VERSION}
    container_name: insforge-app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      postgrest:
        condition: service_healthy
    ports:
      - "${INSFORGE_PORT}:7130"
      - "${INSFORGE_UI_PORT}:7131"
      - "${INSFORGE_AUTH_PORT}:7132"
    environment:
      - PORT=7130
      - PROJECT_ROOT=/app
      - HOST_IP=${HOST_IP}
      - API_BASE_URL=http://${HOST_IP}:${INSFORGE_PORT}
      - VITE_API_BASE_URL=http://${HOST_IP}:${INSFORGE_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - POSTGREST_BASE_URL=http://postgrest:3000
      - STORAGE_DIR=/insforge-storage
      - LOGS_DIR=/insforge-logs
      - AUTH_APP_URL=http://${HOST_IP}:${INSFORGE_AUTH_PORT}
    restart: unless-stopped
    volumes:
      - storage-data:/insforge-storage:Z
      - insforge-logs:/insforge-logs:Z
    networks:
      internal_net:
        ipv4_address: ${PROJECT_IP}
    labels:
      - "dev.arcane.icon=${ARCANE_ICON}"
      - "dev.arcane.category=${ARCANE_CATEGORY}"
      - "com.docker.compose.project=insforge"
      - "com.docker.compose.project.working_dir=/app/data/projects/insforge"

  deno:
    image: ghcr.io/insforge/deno-runtime:${DENO_VERSION}
    container_name: insforge-deno
    working_dir: /app
    depends_on:
      - postgres
      - postgrest
    ports:
      - "${DENO_PORT}:7133"
    environment:
      - PORT=7133
      - DENO_ENV=development
      - DENO_DIR=/deno-dir
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGREST_BASE_URL=http://postgrest:3000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - deno_cache:/deno-dir:Z
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:7133/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - internal_net
    labels:
      - "com.docker.compose.project=insforge"

volumes:
  postgres-data:
    driver: local
  deno_cache:
    driver: local
  storage-data:
    driver: local
  insforge-logs:
    driver: local

networks:
  internal_net:
    external: true
