services:
  affine:
    image: ghcr.io/toeverything/affine-graphql:${AFFINE_VERSION:-latest}
    container_name: affine_server
    restart: unless-stopped
    command:
      - node
      - "--import=./scripts/register.js"
      - "./dist/index.js"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - AFFINE_SERVER_PORT=3010
      - AFFINE_SERVER_HOST=${AFFINE_SERVER_HOST:-0.0.0.0}
      - AFFINE_SERVER_EXTERNAL_URL=http://${HOST_IP}:${AFFINE_PORT}
      - DB_SERVER_HOST=affine_db
      - DB_SERVER_PORT=5432
      - DB_SERVER_USER=${DB_USER}
      - DB_SERVER_PASSWORD=${DB_PASSWORD}
      - DB_SERVER_DATABASE=${DB_NAME}
      - REDIS_SERVER_HOST=affine_redis
      - REDIS_SERVER_PORT=6379
      - REDIS_SERVER_DATABASE=${REDIS_DB:-0}
      - AFFINE_PRIVATE_KEY=${AFFINE_PRIVATE_KEY}
    ports:
      - "${AFFINE_PORT}:3010"
    volumes:
      - ./data/config:/root/.affine/config:Z
      - ./data/storage:/root/.affine/storage:Z
    depends_on:
      affine_db:
        condition: service_healthy
      affine_redis:
        condition: service_started
    labels:
      - "dev.arcane.icon=${ARCANE_ICON}"
      - "dev.arcane.category=${ARCANE_CATEGORY}"
      - "com.docker.compose.project=affine"
      - "com.docker.compose.project.working_dir=/app/data/projects/affine"

  affine_db:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: affine_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  affine_redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: affine_redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data:Z
