version: '3.8'

services:
  supabase-db:
    container_name: supabase-db
    image: docker.io/supabase/postgres:${POSTGRES_VERSION}
    restart: unless-stopped
    labels:
      - "dev.arcane.icon=${ARCANE_ICON:-si:supabase}"
      - "dev.arcane.category=${ARCANE_CATEGORY:-Database}"
      - "com.docker.compose.project=supabase"
      - "com.docker.compose.project.working_dir=/app/data/projects/supabase"
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY}
    volumes:
      - ./volumes/db/realtime.sql:/docker-entrypoint-initdb.d/migrations/99-realtime.sql:Z
      - ./volumes/db/webhooks.sql:/docker-entrypoint-initdb.d/init-scripts/98-webhooks.sql:Z
      - ./volumes/db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:Z
      - ./volumes/db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:Z
      - ./volumes/db/_supabase.sql:/docker-entrypoint-initdb.d/migrations/97-_supabase.sql:Z
      - ./volumes/db/logs.sql:/docker-entrypoint-initdb.d/migrations/99-logs.sql:Z
      - ./volumes/db/pooler.sql:/docker-entrypoint-initdb.d/migrations/99-pooler.sql:Z
      - supabase_db_data:/var/lib/postgresql/data:Z
    networks:
      - internal_net

  supabase-studio:
    container_name: supabase-studio
    image: docker.io/supabase/studio:${STUDIO_VERSION}
    restart: unless-stopped
    ports:
      - "${STUDIO_PORT}:3000"
    environment:
      STUDIO_PG_META_URL: http://supabase-meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SUPABASE_URL: http://${HOST_IP}:${KONG_PORT}
      SUPABASE_REST_URL: http://${HOST_IP}:${KONG_PORT}/rest/v1/
    networks:
      - internal_net

  supabase-auth:
    container_name: supabase-auth
    image: docker.io/supabase/gotrue:${GOTRUE_VERSION}
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: ${GOTRUE_DB_DRIVER}
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      GOTRUE_SITE_URL: http://${HOST_IP}:${STUDIO_PORT}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      API_EXTERNAL_URL: http://${HOST_IP}:${KONG_PORT}
    networks:
      - internal_net

  supabase-rest:
    container_name: supabase-rest
    image: docker.io/postgrest/postgrest:${POSTGREST_VERSION}
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}
    networks:
      - internal_net

  supabase-realtime:
    container_name: supabase-realtime
    image: docker.io/supabase/realtime:${REALTIME_VERSION}
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: supabase-db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
      DISABLE_HEALTHCHECK_LOGGING: "true"
    networks:
      - internal_net

  supabase-meta:
    container_name: supabase-meta
    image: docker.io/supabase/postgres-meta:${META_VERSION}
    restart: unless-stopped
    environment:
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - internal_net

  supabase-storage:
    container_name: supabase-storage
    image: docker.io/supabase/storage-api:${STORAGE_VERSION}
    restart: unless-stopped
    environment:
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
    volumes:
      - supabase_storage_data:/var/lib/storage:Z
    networks:
      - internal_net

  supabase-kong:
    container_name: supabase-kong
    image: docker.io/library/kong:${KONG_VERSION}
    restart: unless-stopped
    ports:
      - "${KONG_PORT}:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
    volumes:
      - ./kong.yml:/var/lib/kong/kong.yml:Z
    networks:
      internal_net:
        ipv4_address: ${PROJECT_IP}

networks:
  internal_net:
    external: true

volumes:
  supabase_db_data:
    name: supabase_db_data
  supabase_storage_data:
    name: supabase_storage_data
