services:
  gitlab:
    image: gitlab/gitlab-ce:${GITLAB_VERSION:-latest}
    container_name: gitlab
    restart: always
    hostname: ${HOST_IP:-localhost}
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://${HOST_IP:-localhost}:${GITLAB_HTTP_PORT:-8929}'
        gitlab_rails['initial_root_password'] = "${GITLAB_ROOT_PASSWORD}"
        gitlab_rails['store_initial_root_password'] = true
        # Reduce memory usage for dev environments
        prometheus['enable'] = false
        alertmanager['enable'] = false
        node_exporter['enable'] = false
        gitlab_exporter['enable'] = false
        grafana['enable'] = false
        # Adjust SSH port in settings
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_SSH_PORT:-8922}
    ports:
      - "${GITLAB_HTTP_PORT:-8929}:80"
      - "${GITLAB_SSH_PORT:-8922}:22"
    volumes:
      - ./config:/etc/gitlab:Z
      - ./logs:/var/log/gitlab:Z
      - ./data:/var/opt/gitlab:Z
    networks:
      internal_net:
        ipv4_address: ${PROJECT_IP}
    labels:
      - "dev.arcane.icon=${ARCANE_ICON}"
      - "dev.arcane.category=${ARCANE_CATEGORY}"
      - "com.docker.compose.project=gitlab"
      - "com.docker.compose.project.working_dir=/app/data/projects/gitlab"

networks:
  internal_net:
    external: true
